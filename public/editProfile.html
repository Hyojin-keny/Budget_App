<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="transactions-page">

    <nav class="main-nav">
        <div class="nav-left">
            <img src="assets/Logo.png" alt="Logo" class="nav-logo">
            <span class="nav-title">Budget & Expense</span>
        </div>
    
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="transactions.html">Transactions</a>
            <a href="history.html">History</a>
            <a href="summary.html">Summary</a>
            <a href="profile.html">Profile</a>
            <button id="logoutBtn" class="btn small">Logout</button>
        </div>
    </nav>

    <div class="content">
        <div class="card">

            <h2>Edit Profile</h2>

            <img id="avatarPreview" class="nav-avatar" src="https://via.placeholder.com/120">

            <form id="profileForm" enctype="multipart/form-data" class="transaction-form">

                <label>Full Name</label>
                <input id="fullName" type="text">

                <label>Phone</label>
                <input id="phone" type="text">

                <label>Address</label>
                <input id="address" type="text">

                <label>Upload Profile Image</label>
                <input type="file" id="avatarFile" name="avatarFile" accept="image/*">


                <label>Avatar URL</label>
                <input id="avatarUrl" type="text">

                <label>Birthday</label>
                <input id="birthday" type="date">

                <button class="btn" type="submit">Save Changes</button>
            </form>

            <div id="profileMsg" class="message"></div>

            <h3>Change Password</h3>
            <form id="passwordForm" class="transaction-form">
                <label>Old Password</label>
                <input type="password" id="oldPassword">

                <label>New Password</label>
                <input type="password" id="newPassword">

                <button class="btn" type="submit">Change Password</button>
            </form>

            <div id="passwordMsg" class="message"></div>

        </div>
    </div>

    <script src="app.js"></script>
    <script src="editProfile.js"></script>
</body>
</html>
