<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summary</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Tabs */
    .summary-tabs {
      display: flex;
      justify-content: space-around;
      margin-top: 15px;
      border-bottom: 2px solid #eee;
    }
    .summary-tabs div {
      padding: 10px 20px;
      font-weight: bold;
      color: #444;
      cursor: pointer;
    }
    .summary-tabs .active {
      color: #007bff;
      border-bottom: 3px solid #007bff;
    }

    /* Time filters */
    .time-filters {
      display: flex;
      gap: 10px;
      padding: 10px;
      overflow-x: auto;
      margin-top: 10px;
    }
    .time-filters button {
      padding: 6px 18px;
      border: none;
      border-radius: 20px;
      background: #eee;
      color: #333;
      cursor: pointer;
      flex-shrink: 0;
    }
    .time-filters .active {
      background: #007bff;
      color: white;
    }

    /* Chart Container */
    .donut-container {
      margin: 20px auto;
      width: 90%;
      max-width: 380px;
    }

    /* Category Table */
    .summary-table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }
    .summary-table th, .summary-table td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    .summary-total {
      font-size: 1.2rem;
      font-weight: bold;
      color: #c70000;
      margin-top: 12px;
      text-align: center;
    }

    /* Budget Section */
    .budget-card {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      text-align: center;
      display: none;
    }
    .budget-card input[type="number"] {
      padding: 5px 10px;
      width: 120px;
      margin-right: 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    .budget-card button {
      padding: 5px 12px;
      border: none;
      border-radius: 4px;
      background-color: #007bff;
      color: white;
      cursor: pointer;
    }
    .budget-warning {
      color: red;
      margin-top: 10px;
      font-weight: bold;
    }

    /* Progress Bar Styles */
    #progressBarContainer {
      width: 80%;
      margin: 15px auto 10px;
      background-color: #f3f3f3;
      border-radius: 5px;
      overflow: hidden;
      height: 25px;
      position: relative;
    }
    #progressBar {
      height: 100%;
      width: 0%;
      background-color: #4CAF50; /* Green */
      text-align: right;
      line-height: 25px;
      color: white;
      font-weight: bold;
      padding-right: 5px;
      transition: width 0.5s ease-in-out, background-color 0.5s;
    }
    #progressBar.warning {
        background-color: #ffc107; /* Yellow */
    }
    #progressBar.danger {
        background-color: #dc3545; /* Red */
    }
    #progressPercent {
      position: absolute;
      width: 100%;
      text-align: center;
      line-height: 25px;
      color: #333;
      font-weight: bold;
      font-size: 14px;
    }
  </style>
</head>
<body class="transactions-page">
  <nav class="main-nav">
    <div class="nav-left">
        <img src="assets/Logo.png" alt="Logo" class="nav-logo">
        <span class="nav-title">Budget & Expense</span>
    </div>

    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="transactions.html">Transactions</a>
        <a href="history.html">History</a>
        <a href="summary.html">Summary</a>
         <a href="profile.html">Profile</a>
        <button id="logoutBtn" class="btn small">Logout</button>
    </div>
  </nav>

  <div class="content">

    <div class="card">
      <h1>View Summary</h1>
      <p>Email: <strong id="userEmail"></strong></p>
    </div>

    <div class="summary-tabs">
      <div class="tab-btn active" data-type="summary">SUMMARY</div>
      <div class="tab-btn" data-type="expense">EXPENSE</div>
      <div class="tab-btn" data-type="income">INCOME</div>
      <div class="tab-btn" data-type="budget">BUDGET</div>
    </div>

    <div class="time-filters">
      <button class="filter-btn active" data-range="all">All</button>
      <button class="filter-btn" data-range="daily">Daily</button>
      <button class="filter-btn" data-range="weekly">Weekly</button>
      <button class="filter-btn" data-range="monthly">Monthly</button>
      <button class="filter-btn" data-range="yearly">Yearly</button>
    </div>

    <div class="card donut-container" id="chartContainer">
      <canvas id="categoryChart"></canvas>
    </div>

    <div class="card" id="tableContainer">
      <table class="summary-table">
        <thead>
          <tr>
            <th>Category</th>
            <th>Amount</th>
            <th>%</th>
          </tr>
        </thead>
        <tbody id="categoryTableBody"></tbody>
      </table>
      <div class="summary-total" id="summaryTotal"></div>
    </div>

    <div class="card budget-card" id="budgetContainer">
      <h3>Set Your Monthly Budget</h3>
      <form id="budgetForm">
        <input type="number" id="budgetAmount" placeholder="Enter budget" min="0" step="0.01">
        <button type="submit">Set Budget</button>
      </form>
      <p>Current Budget: $<span id="currentBudget">0.00</span></p>

      <div id="progressBarContainer">
        <div id="progressBar"></div>
        <span id="progressPercent">0% Used</span>
      </div>
      <p class="budget-warning" id="budgetWarning"></p>
    </div>

  </div>

  <script>
    const token = localStorage.getItem("token");
    const API_URL = "";

    const userEmailEl = document.getElementById("userEmail");
    userEmailEl.textContent = localStorage.getItem("email") || "";

    let allTx = [];
    let currentType = "summary"; 
    let currentRange = "all";
    let chart;

    // Load all transactions
    async function loadTransactions() {
      const res = await fetch(`${API_URL}/transactions`, {
        headers: { "Authorization": `Bearer ${token}` }
      });
      const data = await res.json();
      allTx = data.transactions || [];
      updateSummary();
    }

    function filterByRange(tx) {
      const date = new Date(tx.date);
      const now = new Date();
      const diff = now - date;
      const day = 86400000;

      switch (currentRange) {
        case "daily": return diff <= day;
        case "weekly": return diff <= 7 * day;
        case "monthly": return diff <= 30 * day;
        case "yearly": return diff <= 365 * day;
        default: return true;
      }
    }

    function prepareData() {
      let filtered = allTx.filter(filterByRange);

      if (currentType === "income")
        filtered = filtered.filter(x => x.type === "income");
      if (currentType === "expense")
        filtered = filtered.filter(x => x.type === "expense");

      const categories = {};
      filtered.forEach(tx => {
        if (!categories[tx.description]) categories[tx.description] = 0;
        categories[tx.description] += Number(tx.amount);
      });

      return categories;
    }

    function updateChart() {
      if (currentType === "budget") return; 

      const data = prepareData();
      const labels = Object.keys(data);
      const values = Object.values(data);
      const total = values.reduce((a, b) => a + b, 0);

      const tbody = document.getElementById("categoryTableBody");
      tbody.innerHTML = "";
      labels.forEach((cat, i) => {
        const percent = total ? ((values[i] / total) * 100).toFixed(2) : 0; 
        tbody.innerHTML += `
          <tr>
            <td>${cat}</td>
            <td>$${values[i].toFixed(2)}</td>
            <td>${percent}%</td>
          </tr>
        `;
      });

      document.getElementById("summaryTotal").textContent =
        `${currentType.toUpperCase()} Total: $${total.toFixed(2)}`;

      if (chart) chart.destroy();
      const ctx = document.getElementById("categoryChart").getContext("2d");

      chart = new Chart(ctx, {
        type: "doughnut",
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: ["#8ef57a","#f4e97a","#7ac4f5","#f57a7a","#c57af5"],
            borderWidth: 1
          }]
        },
        options: {
          plugins: {
            legend: { position: "bottom" },
            tooltip: { enabled: true }
          },
          cutout: "60%"
        }
      });
    }

    // ===============================
    // Budget system
    // ===============================
    const budgetForm = document.getElementById("budgetForm");
    const budgetAmountInput = document.getElementById("budgetAmount");
    const currentBudgetEl = document.getElementById("currentBudget");
    const budgetWarningEl = document.getElementById("budgetWarning");
    const budgetContainer = document.getElementById("budgetContainer");
    const chartContainer = document.getElementById("chartContainer");
    const tableContainer = document.getElementById("tableContainer");

    // New Progress Bar elements
    const progressBar = document.getElementById("progressBar");
    const progressPercentEl = document.getElementById("progressPercent");

    function loadBudget() {
      const b = localStorage.getItem("budget");
      return b ? parseFloat(b) : 0;
    }

    function saveBudget(amount) {
      localStorage.setItem("budget", amount);
    }

    function updateBudgetUI() {
      const budget = loadBudget();
      currentBudgetEl.textContent = budget.toFixed(2);
      checkBudgetWarning(budget); // Pass budget to avoid re-loading
    }

    function checkBudgetWarning(budget) {
      const totalExpense = allTx
        .filter(tx => tx.type === "expense")
        .filter(filterByRange)
        .reduce((sum, tx) => sum + Number(tx.amount), 0);

      let usedPercent = 0;
      let barWidth = '0%';
      let warningText = '';

      if (budget > 0) {
        usedPercent = Math.min(100, (totalExpense / budget) * 100);
        barWidth = usedPercent > 100 ? '100%' : `${usedPercent.toFixed(2)}%`;
        
        // Update Warning Text
        if (totalExpense > budget) {
          warningText = "⚠️ You have exceeded your budget!";
          progressBar.className = 'danger'; // Red
        } else if (totalExpense > budget * 0.8) {
          warningText = "⚠️ You have used over 80% of your budget.";
          progressBar.className = 'warning'; // Yellow
        } else {
          warningText = "✅ Budget status is good.";
          progressBar.className = ''; // Green
        }
      } else {
        warningText = "Please set a budget to enable tracking.";
        progressBar.className = '';
      }

      budgetWarningEl.textContent = warningText;
      progressBar.style.width = barWidth;
      
      // Update the progress percentage display
      const percentValue = ((totalExpense / budget) * 100);
      progressPercentEl.textContent = isFinite(percentValue) ? `${percentValue.toFixed(0)}% Used` : '0% Used';
    }

    budgetForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const amount = parseFloat(budgetAmountInput.value);
      if (!amount || amount <= 0) {
        alert("Invalid budget amount");
        return;
      }
      saveBudget(amount);
      updateBudgetUI();
      // Switch back to SUMMARY tab after setting budget
      document.querySelector('.tab-btn.active')?.classList.remove('active');
      document.querySelector('[data-type="summary"]').classList.add('active');
      currentType = "summary";
      updateSummary();
    });

    // Tab switching with budget logic
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelector(".tab-btn.active").classList.remove("active");
        btn.classList.add("active");
        currentType = btn.dataset.type;

        if (currentType === "budget") {
          chartContainer.style.display = "none";
          tableContainer.style.display = "none";
          budgetContainer.style.display = "block";
          document.querySelector(".time-filters").style.display = "none";
        } else {
          chartContainer.style.display = "block";
          tableContainer.style.display = "block";
          budgetContainer.style.display = "none";
          document.querySelector(".time-filters").style.display = "flex";
        }

        updateSummary();
      });
    });

    // Time filter switching
    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelector(".filter-btn.active").classList.remove("active");
        btn.classList.add("active");
        currentRange = btn.dataset.range;
        updateSummary();
      });
    });

    function updateSummary() {
      updateChart();
      updateBudgetUI();
    }

    // Initial load
    loadTransactions();
    // Simulate initial tab click to set the visibility of containers
    document.querySelector('.tab-btn.active')?.click(); 

  </script>
</body>
</html>
