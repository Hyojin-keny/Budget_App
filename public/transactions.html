<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="transactions-page">
    <nav class="main-nav">
        <div class="nav-left">
            <img src="assets/logo.png" alt="Logo" class="nav-logo">
            <span class="nav-title">Budget & Expense</span>
        </div>

        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="transactions.html">Transactions</a>
            <a href="history.html">History</a>
            <a href="summary.html">Summary</a>
            <button id="logoutBtn" class="btn small">Logout</button>
        </div>
    </nav>


    <div class="content">
        <div class="card">
            <h1>Transactions</h1>
            <p>Email: <strong id="userEmail"></strong></p>
        </div>

        <div class="card">
            <section class="transaction-panel">
                <form id="transactionForm" class="transaction-form">
                    <input id="description" type="text" placeholder="Description" required />
                    <input id="amount" type="number" step="0.01" placeholder="Amount" required />
                    <select id="type">
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                    <button type="submit" class="btn">Add</button>
                </form>
                <div id="txMessage" class="message"></div>

                <div class="totals">
                    <p>Income: <strong id="totalIncome">0.00</strong></p>
                    <p>Expenses: <strong id="totalExpense">0.00</strong></p>
                    <p>Balance: <strong id="totalBalance">0.00</strong></p>
                </div>
<section class="budget-section card">
                    <h4>Monthly Budget</h4>
                    <form id="budgetFormTx">
                        <input type="number" id="budgetAmountTx" placeholder="Set monthly budget" min="0" step="0.01" required />
                        <button type="submit" class="btn small">Save</button>
                    </form>
                    <p>Current Budget: $<span id="currentBudgetTx">0.00</span></p>
                    
                    <div id="progressBarContainerTx">
                        <div id="progressBarTx"></div>
                        <span id="progressPercentTx">0% Used</span>
                    </div>
                    <p class="budget-warning" id="budgetWarningTx"></p>
                </section>

                <h4>Transactions</h4>
                <ul id="transactionsList" class="transactions"></ul>
            </section>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
